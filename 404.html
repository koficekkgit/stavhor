<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="robots" content="noindex">
<title>Stránka nenalezena · StavHor</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,700;12..96,800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="icon" type="image/png" href="assets/favicon.png" />
<style>
  :root { --brand: #0a3d68; --ink: #0f172a; --muted: #64748b; }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: 'Inter', -apple-system, sans-serif;
    color: var(--ink);
    background:
      radial-gradient(900px 500px at 80% -10%, rgba(10, 61, 104, .08), transparent 60%),
      radial-gradient(700px 400px at -10% 30%, rgba(10, 61, 104, .06), transparent 60%),
      #fbfcfe;
    min-height: 100vh;
    display: grid;
    place-items: center;
    padding: 24px;
  }
  .wrap { max-width: 560px; text-align: center; }
  .logo-mark {
    width: 66px;
    height: auto;
    margin: 0 auto 30px;
    display: block;
  }
  .code {
    font-family: 'Bricolage Grotesque', sans-serif;
    font-size: clamp(72px, 14vw, 140px);
    font-weight: 800;
    color: var(--brand);
    letter-spacing: -.04em;
    line-height: .9;
    margin: 0 0 12px;
  }
  h1 {
    font-family: 'Bricolage Grotesque', sans-serif;
    font-size: clamp(24px, 3.5vw, 36px);
    letter-spacing: -.02em;
    margin: 0 0 14px;
  }
  p {
    color: var(--muted);
    font-size: 17px;
    margin: 0 0 28px;
  }
  .btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 14px 26px;
    background: var(--brand);
    color: #fff;
    border-radius: 4px;
    font-weight: 600;
    text-decoration: none;
    box-shadow: 0 8px 20px rgba(26, 68, 128, .25);
    transition: transform .2s, box-shadow .2s;
  }
  .btn:hover { transform: translateY(-2px); box-shadow: 0 12px 28px rgba(26, 68, 128, .32); }
  .alt {
    margin-top: 20px;
    font-size: 14px;
    color: var(--muted);
  }
  .alt a { color: var(--brand); font-weight: 600; }
</style>
</head>
<body>
<div class="wrap">
  <img class="logo-mark" src="assets/logo-mark.png" alt="StavHor" />
  <div class="code">404</div>
  <h1>Tady to neumíme postavit.</h1>
  <p>Stránka, kterou hledáte, neexistuje nebo byla přesunuta.</p>
  <a href="/" class="btn">← Zpět na hlavní stránku</a>
  <p class="alt">Nebo nám zavolejte: <a href="tel:+420732890407">732 890 407</a></p>
</div>
</body>
</html>
